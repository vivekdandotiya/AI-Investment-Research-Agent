<!doctype html>
<html lang="en" class="bg-white text-slate-950">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvesTrack | AI Investment Research Agent</title>
    <!-- Google Fonts: Space Grotesk & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
  (function() {
    const WEBSITE_ID = 'investment';
    const DASHBOARD_URL = 'https://real-time-dashboard-three.vercel.app';
    
    function sendEvent(level, message, details = {}) {
      fetch(DASHBOARD_URL + '/api/logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        mode: 'cors',
        body: JSON.stringify({
          websiteId: WEBSITE_ID,
          level: level,
          service: 'Client Browser',
          message: message,
          details: details
        })
      }).catch(err => {});
    }

    // 1. Capture uncaught errors
    window.addEventListener('error', function(event) {
      sendEvent('ERROR', 'Uncaught Error: ' + event.message, {
        filename: event.filename,
        lineno: event.lineno,
        colno: event.colno,
        stack: event.error ? event.error.stack : null
      });
    });

    // 2. Capture unhandled promise rejections
    window.addEventListener('unhandledrejection', function(event) {
      sendEvent('ERROR', 'Unhandled Promise Rejection: ' + event.reason, {
        reason: String(event.reason)
      });
    });

    // 3. Intercept console prints automatically
    const originalLog = console.log;
    const originalWarn = console.warn;
    const originalError = console.error;
    let inConsoleInterceptor = false;

    console.log = function(...args) {
      originalLog.apply(console, args);
      if (inConsoleInterceptor) return;
      inConsoleInterceptor = true;
      try {
        const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
        sendEvent('INFO', msg);
      } catch (e) {}
      inConsoleInterceptor = false;
    };

    console.warn = function(...args) {
      originalWarn.apply(console, args);
      if (inConsoleInterceptor) return;
      inConsoleInterceptor = true;
      try {
        const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
        sendEvent('WARN', msg);
      } catch (e) {}
      inConsoleInterceptor = false;
    };

    console.error = function(...args) {
      originalError.apply(console, args);
      if (inConsoleInterceptor) return;
      inConsoleInterceptor = true;
      try {
        const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
        sendEvent('ERROR', msg);
      } catch (e) {}
      inConsoleInterceptor = false;
    };

    // 4. Expose global logger for custom events
    window.dashLogger = {
      info: (msg, details) => sendEvent('INFO', msg, details),
      warn: (msg, details) => sendEvent('WARN', msg, details),
      error: (msg, details) => sendEvent('ERROR', msg, details)
    };
  })();
</script>
  </head>
  <body class="min-h-screen overflow-x-hidden selection:bg-black selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
